<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">

  <!-- Background -->
  <rect width="1024" height="1024" fill="#F5F1EA"/>

  <!-- TOP BAND -->
  <!-- Kicker -->
  <text x="64" y="90" font-size="12" font-weight="600" fill="#C24A1F" letter-spacing="0.18em" text-anchor="start" font-variant="small-caps">DIGITALIZATION</text>

  <!-- Display Headline -->
  <text x="64" y="148" font-size="54" font-weight="800" fill="#111111" letter-spacing="-0.02em" text-anchor="start">
    <tspan x="64" dy="0">Design for the worker,</tspan>
    <tspan x="64" dy="62">not the dashboard.</tspan>
  </text>

  <!-- Accent underline under headline -->
  <rect x="64" y="222" width="180" height="3" rx="1.5" fill="#C24A1F"/>

  <!-- MIDDLE BAND — 4 tiles in 2x2 grid -->
  <!-- Tile dimensions: each ~432px wide, ~270px tall, gap 16px, start y=252 -->

  <!-- Tile 01 — top left -->
  <rect x="64" y="256" width="432" height="270" rx="16" fill="#EFEAE0" stroke="#11111118" stroke-width="1"/>
  <text x="96" y="316" font-size="48" font-weight="800" fill="#C24A1F" letter-spacing="-0.02em">01</text>
  <text x="96" y="356" font-size="22" font-weight="700" fill="#111111">Built for data,</text>
  <text x="96" y="383" font-size="22" font-weight="700" fill="#111111">not for work</text>
  <text x="96" y="422" font-size="15" font-weight="400" fill="#3A3A3A">Teams optimize uptime, not operator decisions.</text>

  <!-- Tile 02 — top right -->
  <rect x="528" y="256" width="432" height="270" rx="16" fill="#EFEAE0" stroke="#11111118" stroke-width="1"/>
  <text x="560" y="316" font-size="48" font-weight="800" fill="#C24A1F" letter-spacing="-0.02em">02</text>
  <text x="560" y="356" font-size="22" font-weight="700" fill="#111111">Alerts that train</text>
  <text x="560" y="383" font-size="22" font-weight="700" fill="#111111">people to ignore</text>
  <text x="560" y="422" font-size="15" font-weight="400" fill="#3A3A3A">Noisy dashboards push operators back to notebooks.</text>

  <!-- Tile 03 — bottom left -->
  <rect x="64" y="542" width="432" height="270" rx="16" fill="#EFEAE0" stroke="#11111118" stroke-width="1"/>
  <text x="96" y="602" font-size="48" font-weight="800" fill="#C24A1F" letter-spacing="-0.02em">03</text>
  <text x="96" y="642" font-size="22" font-weight="700" fill="#111111">Watch one shift</text>
  <text x="96" y="669" font-size="22" font-weight="700" fill="#111111">before you build</text>
  <text x="96" y="708" font-size="15" font-weight="400" fill="#3A3A3A">Map every decision, constraint, and information gap.</text>

  <!-- Tile 04 — bottom right -->
  <rect x="528" y="542" width="432" height="270" rx="16" fill="#EFEAE0" stroke="#11111118" stroke-width="1"/>
  <text x="560" y="602" font-size="48" font-weight="800" fill="#C24A1F" letter-spacing="-0.02em">04</text>
  <text x="560" y="642" font-size="22" font-weight="700" fill="#111111">Precede decisions,</text>
  <text x="560" y="669" font-size="22" font-weight="700" fill="#111111">don't just report</text>
  <text x="560" y="708" font-size="15" font-weight="400" fill="#3A3A3A">Your system must arrive before the operator needs it.</text>

  <!-- BOTTOM BAND -->
  <!-- Hairline rule -->
  <line x1="64" y1="856" x2="960" y2="856" stroke="#11111130" stroke-width="1"/>

  <!-- Closing line -->
  <text x="512" y="912" font-size="20" font-weight="600" fill="#3A3A3A" text-anchor="middle" letter-spacing="-0.01em">If they're not using it, you just added complexity.</text>

</svg>