<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">

  <!-- Background -->
  <rect width="1024" height="1024" fill="#F5F1EA"/>

  <!-- Top Band: kicker + headline (~22% = 225px) -->
  <!-- Kicker -->
  <text x="64" y="96" font-size="13" font-weight="600" fill="#C24A1F" letter-spacing="0.18em" text-anchor="start" font-variant="normal">DIGITALIZATION</text>

  <!-- Headline line 1 -->
  <text x="64" y="154" font-size="54" font-weight="800" fill="#111111" letter-spacing="-0.025em">Pilots thrive on control.</text>
  <!-- Headline line 2 -->
  <text x="64" y="213" font-size="54" font-weight="800" fill="#111111" letter-spacing="-0.025em">Factories run on variance.</text>

  <!-- Accent underline beneath headline -->
  <rect x="64" y="226" width="180" height="3" rx="1.5" fill="#C24A1F"/>

  <!-- Middle Band: 5 tiles, layout 2 top + 3 bottom (~62% of canvas = 635px tall, y=258 to y=893) -->
  <!-- Top row: 2 tall tiles, each ~456px wide, gap 16px, height ~300px -->
  <!-- Tile 1: x=64, y=258, w=448, h=300 -->
  <rect x="64" y="258" width="448" height="300" rx="16" fill="#EFEAE0" stroke="#11111118" stroke-width="1"/>
  <text x="92" y="316" font-size="52" font-weight="800" fill="#C24A1F">01</text>
  <text x="92" y="360" font-size="22" font-weight="700" fill="#111111">Pilot = controlled</text>
  <text x="92" y="360">
    <tspan x="92" dy="0" font-size="22" font-weight="700" fill="#111111"></tspan>
  </text>
  <text x="92" y="392" font-size="15" font-weight="400" fill="#3A3A3A">You pre-clean data and tune every variable.</text>
  <!-- divider line -->
  <line x1="92" y1="418" x2="480" y2="418" stroke="#11111115" stroke-width="1"/>
  <text x="92" y="448" font-size="14" font-weight="400" fill="#3A3A3A" font-style="italic">95% accuracy in isolation.</text>
  <!-- small label -->
  <text x="92" y="524" font-size="13" font-weight="600" fill="#C24A1F" letter-spacing="0.12em">CAUSE</text>

  <!-- Tile 2: x=528, y=258, w=432, h=300 -->
  <rect x="528" y="258" width="432" height="300" rx="16" fill="#FFFFFF" stroke="#11111118" stroke-width="1"/>
  <text x="556" y="316" font-size="52" font-weight="800" fill="#C24A1F">02</text>
  <text x="556" y="360" font-size="22" font-weight="700" fill="#111111">Reality = variance</text>
  <text x="556" y="392" font-size="15" font-weight="400" fill="#3A3A3A">Drift, stoppages, undocumented workarounds.</text>
  <line x1="556" y1="418" x2="928" y2="418" stroke="#11111115" stroke-width="1"/>
  <text x="556" y="448" font-size="14" font-weight="400" fill="#3A3A3A" font-style="italic">73% accuracy in the wild.</text>
  <text x="556" y="524" font-size="13" font-weight="600" fill="#C24A1F" letter-spacing="0.12em">MECHANISM</text>

  <!-- Bottom row: 3 short tiles, y=574, height=230 -->
  <!-- Tile 3: x=64, w=283, h=230 -->
  <rect x="64" y="590" width="283" height="250" rx="16" fill="#EFEAE0" stroke="#11111118" stroke-width="1"/>
  <text x="90" y="640" font-size="44" font-weight="800" fill="#C24A1F">03</text>
  <text x="90" y="674" font-size="19" font-weight="700" fill="#111111">Map your drift</text>
  <text x="90" y="700" font-size="14" font-weight="400" fill="#3A3A3A" width="240">Five sources: age, shift,</text>
  <text x="90" y="720" font-size="14" font-weight="400" fill="#3A3A3A">network, work standards, demand.</text>
  <text x="90" y="812" font-size="12" font-weight="600" fill="#C24A1F" letter-spacing="0.12em">DIAGNOSE</text>

  <!-- Tile 4: x=363, w=283, h=230 -->
  <rect x="363" y="590" width="283" height="250" rx="16" fill="#FFFFFF" stroke="#11111118" stroke-width="1"/>
  <text x="389" y="640" font-size="44" font-weight="800" fill="#C24A1F">04</text>
  <text x="389" y="674" font-size="19" font-weight="700" fill="#111111">Break it on purpose</text>
  <text x="389" y="700" font-size="14" font-weight="400" fill="#3A3A3A">Stress-test one variable</text>
  <text x="389" y="720" font-size="14" font-weight="400" fill="#3A3A3A">at a time before scaling.</text>
  <text x="389" y="812" font-size="12" font-weight="600" fill="#C24A1F" letter-spacing="0.12em">METHOD</text>

  <!-- Tile 5: x=662, w=298, h=230 -->
  <rect x="662" y="590" width="298" height="250" rx="16" fill="#EFEAE0" stroke="#11111118" stroke-width="1"/>
  <text x="688" y="640" font-size="44" font-weight="800" fill="#C24A1F">05</text>
  <text x="688" y="674" font-size="19" font-weight="700" fill="#111111">Absorb variance</text>
  <text x="688" y="700" font-size="14" font-weight="400" fill="#3A3A3A">Design to tolerate variance,</text>
  <text x="688" y="720" font-size="14" font-weight="400" fill="#3A3A3A">not eliminate it.</text>
  <text x="688" y="812" font-size="12" font-weight="600" fill="#C24A1F" letter-spacing="0.12em">FIX</text>

  <!-- Bottom Band: hairline + closing line -->
  <line x1="64" y1="875" x2="960" y2="875" stroke="#11111120" stroke-width="1"/>
  <text x="512" y="920" font-size="20" font-weight="600" fill="#3A3A3A" text-anchor="middle" letter-spacing="-0.01em">Built for perfection won't scale. Built for variance will.</text>

</svg>