<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">

  <!-- Background -->
  <rect width="1024" height="1024" fill="#F5F1EA"/>

  <!-- TOP BAND -->
  <!-- Kicker -->
  <text x="64" y="96" font-size="11" font-weight="600" fill="#2D5BFF" letter-spacing="0.18em" text-anchor="start">AI</text>

  <!-- Display Headline -->
  <text x="64" y="148" font-size="52" font-weight="800" fill="#111111" letter-spacing="-0.02em">
    <tspan x="64" dy="0">Your model is right.</tspan>
    <tspan x="64" dy="62">Operations still won't use it.</tspan>
  </text>

  <!-- Accent underline under headline -->
  <rect x="64" y="222" width="180" height="3" rx="1.5" fill="#2D5BFF"/>

  <!-- MIDDLE BAND — 4 tiles in 2x2 grid -->
  <!-- Tile dimensions: width = (1024 - 64 - 64 - 16) / 2 = 440, height = (tile area) -->
  <!-- Middle band: y=254 to y=830, height=576. Two rows: (576-16)/2 = 280 each -->

  <!-- TILE 01 — top left -->
  <rect x="64" y="254" width="440" height="275" rx="16" fill="#EFEAE0" stroke="#11111118" stroke-width="1"/>
  <text x="92" y="306" font-size="44" font-weight="800" fill="#2D5BFF">01</text>
  <text x="92" y="348" font-size="20" font-weight="700" fill="#111111">The Performance Trap</text>
  <text x="92" y="378" font-size="15" font-weight="400" fill="#3A3A3A">94% accuracy hides 600 false</text>
  <text x="92" y="398" font-size="15" font-weight="400" fill="#3A3A3A">alarms per 10,000 assets.</text>
  <!-- Visual element: asymmetry bar chart sketch -->
  <rect x="92" y="428" width="360" height="4" rx="2" fill="#11111118"/>
  <rect x="92" y="440" width="30" height="40" rx="3" fill="#2D5BFF" opacity="0.18"/>
  <rect x="134" y="410" width="30" height="70" rx="3" fill="#2D5BFF" opacity="0.35"/>
  <rect x="176" y="422" width="30" height="58" rx="3" fill="#2D5BFF" opacity="0.25"/>
  <rect x="218" y="430" width="30" height="42" rx="3" fill="#2D5BFF" opacity="0.18"/>
  <text x="92" y="500" font-size="11" font-weight="400" fill="#3A3A3A" opacity="0.6">Each false alarm: 4 hrs unplanned maintenance</text>

  <!-- TILE 02 — top right -->
  <rect x="520" y="254" width="440" height="275" rx="16" fill="#EFEAE0" stroke="#11111118" stroke-width="1"/>
  <text x="548" y="306" font-size="44" font-weight="800" fill="#2D5BFF">02</text>
  <text x="548" y="348" font-size="20" font-weight="700" fill="#111111">Symmetric vs. Asymmetric</text>
  <text x="548" y="378" font-size="15" font-weight="400" fill="#3A3A3A">ML treats errors equally.</text>
  <text x="548" y="398" font-size="15" font-weight="400" fill="#3A3A3A">Operations costs are not equal.</text>
  <!-- Visual: two-column cost comparison -->
  <rect x="548" y="420" width="172" height="64" rx="8" fill="#2D5BFF" opacity="0.10"/>
  <rect x="736" y="420" width="172" height="64" rx="8" fill="#C24A1F" opacity="0.10"/>
  <text x="634" y="447" font-size="11" font-weight="600" fill="#2D5BFF" text-anchor="middle" letter-spacing="0.06em">FALSE ALARM</text>
  <text x="634" y="465" font-size="18" font-weight="800" fill="#2D5BFF" text-anchor="middle">1×</text>
  <text x="822" y="447" font-size="11" font-weight="600" fill="#C24A1F" text-anchor="middle" letter-spacing="0.06em">MISSED FAILURE</text>
  <text x="822" y="465" font-size="18" font-weight="800" fill="#C24A1F" text-anchor="middle">10×</text>
  <text x="548" y="507" font-size="11" font-weight="400" fill="#3A3A3A" opacity="0.6">Nobody told the model this asymmetry exists</text>

  <!-- TILE 03 — bottom left -->
  <rect x="64" y="545" width="440" height="275" rx="16" fill="#FFFFFF" stroke="#11111118" stroke-width="1"/>
  <text x="92" y="597" font-size="44" font-weight="800" fill="#2D5BFF">03</text>
  <text x="92" y="639" font-size="20" font-weight="700" fill="#111111">The Wrong Question</text>
  <text x="92" y="669" font-size="15" font-weight="400" fill="#3A3A3A">Teams ask: what accuracy</text>
  <text x="92" y="689" font-size="15" font-weight="400" fill="#3A3A3A">do we need?</text>
  <!-- Visual: crossed-out question vs arrow -->
  <rect x="92" y="712" width="180" height="36" rx="6" fill="#11111118"/>
  <text x="182" y="735" font-size="13" font-weight="600" fill="#3A3A3A" text-anchor="middle">"What accuracy?"</text>
  <!-- strikethrough line -->
  <line x1="100" y1="730" x2="265" y2="730" stroke="#C24A1F" stroke-width="2" opacity="0.6"/>
  <rect x="290" y="712" width="150" height="36" rx="6" fill="#2D5BFF" opacity="0.12"/>
  <text x="365" y="735" font-size="13" font-weight="700" fill="#2D5BFF" text-anchor="middle">"What costs?"</text>
  <text x="92" y="791" font-size="11" font-weight="400" fill="#3A3A3A" opacity="0.6">Statistical performance ≠ operational value</text>

  <!-- TILE 04 — bottom right -->
  <rect x="520" y="545" width="440" height="275" rx="16" fill="#FFFFFF" stroke="#11111118" stroke-width="1"/>
  <text x="548" y="597" font-size="44" font-weight="800" fill="#2D5BFF">04</text>
  <text x="548" y="639" font-size="20" font-weight="700" fill="#111111">Align the Target</text>
  <text x="548" y="669" font-size="15" font-weight="400" fill="#3A3A3A">Rebuild decision thresholds</text>
  <text x="548" y="689" font-size="15" font-weight="400" fill="#3A3A3A">around your operation's asymmetry.</text>
  <!-- Visual: threshold slider concept -->
  <rect x="548" y="714" width="360" height="6" rx="3" fill="#11111118"/>
  <rect x="548" y="714" width="230" height="6" rx="3" fill="#2D5BFF" opacity="0.35"/>
  <circle cx="778" cy="717" r="10" fill="#2D5BFF"/>
  <text x="548" y="744" font-size="11" font-weight="400" fill="#3A3A3A" opacity="0.5">Low threshold</text>
  <text x="908" y="744" font-size="11" font-weight="400" fill="#3A3A3A" opacity="0.5" text-anchor="end">High threshold</text>
  <text x="778" y="744" font-size="11" font-weight="700" fill="#2D5BFF" text-anchor="middle">Calibrated</text>
  <text x="548" y="791" font-size="11" font-weight="400" fill="#3A3A3A" opacity="0.6">Adoption gap is about optimization targets, not algorithms</text>

  <!-- BOTTOM BAND -->
  <!-- Hairline rule -->
  <line x1="64" y1="848" x2="960" y2="848" stroke="#11111118" stroke-width="1"/>

  <!-- Closing line -->
  <text x="512" y="912" font-size="22" font-weight="700" fill="#3A3A3A" text-anchor="middle" letter-spacing="-0.01em">Match your model's goal to your operation's reality.</text>

</svg>