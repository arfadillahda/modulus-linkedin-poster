<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">

  <!-- Background -->
  <rect width="1024" height="1024" fill="#F5F1EA"/>

  <!-- TOP BAND -->
  <!-- Kicker label -->
  <text x="64" y="88" font-size="11" font-weight="600" fill="#2D5BFF" letter-spacing="0.18em" text-anchor="start" font-variant="small-caps">AI</text>

  <!-- Display headline -->
  <text x="64" y="138" font-size="48" font-weight="800" fill="#111111" letter-spacing="-0.02em">
    <tspan x="64" dy="0">Solve the real bottleneck,</tspan>
    <tspan x="64" dy="56">not the measurable one.</tspan>
  </text>

  <!-- Accent underline under headline -->
  <rect x="64" y="200" width="120" height="3" rx="1.5" fill="#2D5BFF"/>

  <!-- MIDDLE BAND: 2x2 grid of 4 tiles -->
  <!-- Tile positions: 2 columns, 2 rows -->
  <!-- Col1 x=64, Col2 x=64+470+16=550 -->
  <!-- Row1 y=232, Row2 y=232+230+16=478 -->
  <!-- Tile width = (1024 - 64 - 64 - 16) / 2 = (880)/2 = 440 ... let's do (1024-128-16)/2 = 440 -->
  <!-- Tile height ~215 -->

  <!-- Tile 01 -->
  <rect x="64" y="232" width="440" height="215" rx="16" fill="#EFEAE0" stroke="#11111118" stroke-width="1"/>
  <text x="88" y="283" font-size="40" font-weight="800" fill="#2D5BFF">01</text>
  <text x="88" y="316" font-size="17" font-weight="700" fill="#111111">Vendors optimize metrics</text>
  <text x="88" y="344" font-size="13.5" font-weight="400" fill="#3A3A3A">Model accuracy is easy to benchmark first</text>
  <!-- small decorative line -->
  <line x1="88" y1="362" x2="180" y2="362" stroke="#2D5BFF" stroke-width="1" opacity="0.35"/>
  <text x="88" y="412" font-size="12.5" font-weight="400" fill="#3A3A3A" font-style="italic">The measurable wins, not the useful one.</text>

  <!-- Tile 02 -->
  <rect x="520" y="232" width="440" height="215" rx="16" fill="#EFEAE0" stroke="#11111118" stroke-width="1"/>
  <text x="544" y="283" font-size="40" font-weight="800" fill="#2D5BFF">02</text>
  <text x="544" y="316" font-size="17" font-weight="700" fill="#111111">Real friction hides below</text>
  <text x="544" y="344" font-size="13.5" font-weight="400" fill="#3A3A3A">Data freshness, latency, or operator adoption</text>
  <line x1="544" y1="362" x2="636" y2="362" stroke="#2D5BFF" stroke-width="1" opacity="0.35"/>
  <text x="544" y="412" font-size="12.5" font-weight="400" fill="#3A3A3A" font-style="italic">You find out only after spending the money.</text>

  <!-- Tile 03 -->
  <rect x="64" y="463" width="440" height="215" rx="16" fill="#EFEAE0" stroke="#11111118" stroke-width="1"/>
  <text x="88" y="514" font-size="40" font-weight="800" fill="#2D5BFF">03</text>
  <text x="88" y="547" font-size="17" font-weight="700" fill="#111111">Ask one question first</text>
  <text x="88" y="575" font-size="13.5" font-weight="400" fill="#3A3A3A">"What has to be true to get used?"</text>
  <line x1="88" y1="593" x2="180" y2="593" stroke="#2D5BFF" stroke-width="1" opacity="0.35"/>
  <text x="88" y="643" font-size="12.5" font-weight="400" fill="#3A3A3A" font-style="italic">Name the behavior change and what blocks it.</text>

  <!-- Tile 04 -->
  <rect x="520" y="463" width="440" height="215" rx="16" fill="#EFEAE0" stroke="#11111118" stroke-width="1"/>
  <text x="544" y="514" font-size="40" font-weight="800" fill="#2D5BFF">04</text>
  <text x="544" y="547" font-size="17" font-weight="700" fill="#111111">Size the solution to match</text>
  <text x="544" y="575" font-size="13.5" font-weight="400" fill="#3A3A3A">Name the bottleneck, then scope the AI work</text>
  <line x1="544" y1="593" x2="636" y2="593" stroke="#2D5BFF" stroke-width="1" opacity="0.35"/>
  <text x="544" y="643" font-size="12.5" font-weight="400" fill="#3A3A3A" font-style="italic">92% accuracy is wasted if adoption is the block.</text>

  <!-- BOTTOM BAND -->
  <!-- Hairline rule -->
  <line x1="64" y1="724" x2="960" y2="724" stroke="#11111118" stroke-width="1"/>

  <!-- Closing line -->
  <text x="512" y="800" font-size="22" font-weight="700" fill="#3A3A3A" text-anchor="middle" letter-spacing="-0.01em">Your AI is only as good as the constraint it removes.</text>

  <!-- Secondary closing note -->
  <text x="512" y="836" font-size="13" font-weight="400" fill="#3A3A3A" text-anchor="middle" opacity="0.65">Work backwards from adoption, not forwards from accuracy.</text>

  <!-- Bottom decorative element: small accent dots -->
  <circle cx="492" cy="878" r="3" fill="#2D5BFF" opacity="0.4"/>
  <circle cx="512" cy="878" r="3" fill="#2D5BFF" opacity="0.7"/>
  <circle cx="532" cy="878" r="3" fill="#2D5BFF" opacity="0.4"/>

</svg>