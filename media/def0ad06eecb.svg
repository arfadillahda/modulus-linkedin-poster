<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">

  <!-- Background -->
  <rect width="1024" height="1024" fill="#F5F1EA"/>

  <!-- Top band -->
  <!-- Kicker label -->
  <text x="64" y="96" font-size="12" font-weight="600" fill="#2D5BFF" letter-spacing="0.18em" text-anchor="start" font-variant="small-caps">AI</text>

  <!-- Display headline -->
  <text x="64" y="148" font-size="48" font-weight="800" fill="#111111" letter-spacing="-0.02em" text-anchor="start">Fine-tuning can fool</text>
  <text x="64" y="204" font-size="48" font-weight="800" fill="#111111" letter-spacing="-0.02em" text-anchor="start">you before it fails you</text>

  <!-- Accent underline under headline -->
  <line x1="64" y1="218" x2="340" y2="218" stroke="#2D5BFF" stroke-width="2"/>

  <!-- Middle band: 4 tiles in 2x2 grid -->
  <!-- Tile dimensions: each tile ~424px wide, ~240px tall, 16px gap, starting y=248 -->
  <!-- Col1 x=64, Col2 x=64+424+16=504 -->
  <!-- Row1 y=248, Row2 y=248+240+16=504 -->

  <!-- Tile 01 -->
  <rect x="64" y="248" width="424" height="240" rx="16" fill="#EFEAE0" stroke="#11111118" stroke-width="1"/>
  <text x="92" y="302" font-size="36" font-weight="800" fill="#2D5BFF">01</text>
  <text x="92" y="340" font-size="20" font-weight="700" fill="#111111">Validation Is Too Clean</text>
  <text x="92" y="372" font-size="15" font-weight="400" fill="#3A3A3A">Your labeled set never sees production noise.</text>
  <text x="92" y="394" font-size="15" font-weight="400" fill="#3A3A3A">Edge cases arrive after launch.</text>

  <!-- Tile 02 -->
  <rect x="504" y="248" width="456" height="240" rx="16" fill="#EFEAE0" stroke="#11111118" stroke-width="1"/>
  <text x="532" y="302" font-size="36" font-weight="800" fill="#2D5BFF">02</text>
  <text x="532" y="340" font-size="20" font-weight="700" fill="#111111">Spurious Correlations Win</text>
  <text x="532" y="372" font-size="15" font-weight="400" fill="#3A3A3A">500 examples teach patterns that break</text>
  <text x="532" y="394" font-size="15" font-weight="400" fill="#3A3A3A">at 50,000 real inference calls.</text>

  <!-- Tile 03 -->
  <rect x="64" y="504" width="424" height="240" rx="16" fill="#EFEAE0" stroke="#11111118" stroke-width="1"/>
  <text x="92" y="558" font-size="36" font-weight="800" fill="#2D5BFF">03</text>
  <text x="92" y="596" font-size="20" font-weight="700" fill="#111111">Distribution Shift Bites</text>
  <text x="92" y="628" font-size="15" font-weight="400" fill="#3A3A3A">Fine-tuning amplifies the gap between</text>
  <text x="92" y="650" font-size="15" font-weight="400" fill="#3A3A3A">your data and real-world data.</text>

  <!-- Tile 04 -->
  <rect x="504" y="504" width="456" height="240" rx="16" fill="#EFEAE0" stroke="#11111118" stroke-width="1"/>
  <text x="532" y="558" font-size="36" font-weight="800" fill="#2D5BFF">04</text>
  <text x="532" y="596" font-size="20" font-weight="700" fill="#111111">The Adversarial Test Fix</text>
  <text x="532" y="628" font-size="15" font-weight="400" fill="#3A3A3A">Use examples easy for humans but</text>
  <text x="532" y="650" font-size="15" font-weight="400" fill="#3A3A3A">that break your model's assumptions.</text>

  <!-- Bottom band -->
  <!-- Hairline rule -->
  <line x1="64" y1="790" x2="960" y2="790" stroke="#11111130" stroke-width="1"/>

  <!-- Closing line -->
  <text x="512" y="840" font-size="22" font-weight="600" fill="#3A3A3A" text-anchor="middle" letter-spacing="-0.01em">Fine-tuning is a liability until it survives real distribution.</text>

</svg>