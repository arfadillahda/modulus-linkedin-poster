<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">

  <!-- Background -->
  <rect width="1024" height="1024" fill="#F5F1EA"/>

  <!-- TOP BAND -->
  <!-- Kicker -->
  <text x="64" y="96" font-size="13" font-weight="600" fill="#C24A1F" letter-spacing="0.18em" text-anchor="start" font-variant="small-caps">DIGITALIZATION</text>

  <!-- Display Headline -->
  <text x="64" y="148" font-size="52" font-weight="800" fill="#111111" letter-spacing="-0.02em" text-anchor="start">Your budget skips the</text>
  <text x="64" y="206" font-size="52" font-weight="800" fill="#111111" letter-spacing="-0.02em" text-anchor="start">layer that matters most</text>

  <!-- Accent underline rule under headline -->
  <rect x="64" y="218" width="180" height="3" rx="1.5" fill="#C24A1F"/>

  <!-- MIDDLE BAND — 4 tiles in 2x2 grid -->
  <!-- Tile layout: outer padding 64px, gap 16px, 2 cols -->
  <!-- Each tile: width = (1024 - 64 - 64 - 16) / 2 = 440, height = (1024*0.62 - 16) / 2 ~= 299 -->
  <!-- Middle band starts at y=248, spans ~635px height -->
  <!-- Tile row 1 y=248, tile row 2 y=248+16+299=563 -->
  <!-- Tile widths: (896-16)/2 = 440 -->

  <!-- TILE 01 — top left -->
  <rect x="64" y="248" width="440" height="299" rx="16" fill="#EFEAE0" stroke="#11111118" stroke-width="1"/>
  <text x="92" y="306" font-size="48" font-weight="800" fill="#C24A1F" letter-spacing="-0.01em">01</text>
  <text x="92" y="348" font-size="22" font-weight="700" fill="#111111">Spending flows upward</text>
  <text x="92" y="380" font-size="16" font-weight="400" fill="#3A3A3A">Budgets chase cloud and dashboards, not sensors</text>

  <!-- TILE 02 — top right -->
  <rect x="520" y="248" width="440" height="299" rx="16" fill="#EFEAE0" stroke="#11111118" stroke-width="1"/>
  <text x="548" y="306" font-size="48" font-weight="800" fill="#C24A1F" letter-spacing="-0.01em">02</text>
  <text x="548" y="348" font-size="22" font-weight="700" fill="#111111">Friction lives at the edge</text>
  <text x="548" y="380" font-size="16" font-weight="400" fill="#3A3A3A">Signals degrade where data is actually born</text>

  <!-- TILE 03 — bottom left -->
  <rect x="64" y="563" width="440" height="299" rx="16" fill="#EFEAE0" stroke="#11111118" stroke-width="1"/>
  <text x="92" y="621" font-size="48" font-weight="800" fill="#C24A1F" letter-spacing="-0.01em">03</text>
  <text x="92" y="663" font-size="22" font-weight="700" fill="#111111">The invisible layer</text>
  <text x="92" y="695" font-size="16" font-weight="400" fill="#3A3A3A">PLCs and RTUs are hidden from decision-makers</text>

  <!-- TILE 04 — bottom right -->
  <rect x="520" y="563" width="440" height="299" rx="16" fill="#EFEAE0" stroke="#11111118" stroke-width="1"/>
  <text x="548" y="621" font-size="48" font-weight="800" fill="#C24A1F" letter-spacing="-0.01em">04</text>
  <text x="548" y="663" font-size="22" font-weight="700" fill="#111111">Audit before you buy</text>
  <text x="548" y="695" font-size="16" font-weight="400" fill="#3A3A3A">Weak foundations break any platform you add</text>

  <!-- BOTTOM BAND -->
  <!-- Hairline rule -->
  <line x1="64" y1="896" x2="960" y2="896" stroke="#11111130" stroke-width="1"/>

  <!-- Closing line -->
  <text x="512" y="958" font-size="22" font-weight="600" fill="#3A3A3A" text-anchor="middle" letter-spacing="-0.01em">Clean data at the edge beats polished reports on dirty inputs.</text>

</svg>