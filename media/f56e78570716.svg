<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">

  <!-- Background -->
  <rect width="1024" height="1024" fill="#F5F1EA"/>

  <!-- TOP BAND (0–225px) -->
  <!-- Kicker -->
  <text x="64" y="88" font-size="13" font-weight="600" fill="#C24A1F" letter-spacing="0.18em" text-anchor="start" font-variant="small-caps">AI</text>

  <!-- Display Headline -->
  <text x="64" y="138" font-size="52" font-weight="800" fill="#111111" letter-spacing="-0.02em">Your ROI is a workflow</text>
  <text x="64" y="196" font-size="52" font-weight="800" fill="#111111" letter-spacing="-0.02em">problem, not a model problem.</text>

  <!-- Accent underline under headline -->
  <rect x="64" y="208" width="220" height="3" rx="1.5" fill="#C24A1F"/>

  <!-- MIDDLE BAND: 4-tile 2x2 grid (225–875px) -->
  <!-- Tile dimensions: col width=(1024-64-64-16)/2=440, tile height=(875-240-16)/2=309 -->
  <!-- Row 1 y=240, Row 2 y=240+309+16=565 -->
  <!-- Col 1 x=64, Col 2 x=64+440+16=520 -->

  <!-- Tile 01 -->
  <rect x="64" y="240" width="440" height="309" rx="16" fill="#EFEAE0" stroke="#11111118" stroke-width="1"/>
  <text x="92" y="300" font-size="44" font-weight="800" fill="#C24A1F">01</text>
  <text x="92" y="342" font-size="22" font-weight="700" fill="#111111">The Wrong Baseline</text>
  <text x="92" y="374" font-size="16" font-weight="400" fill="#3A3A3A">You're comparing model cost to labor saved.</text>
  <!-- Decorative rule -->
  <rect x="92" y="400" width="360" height="1" fill="#11111114"/>
  <!-- Sub note -->
  <text x="92" y="432" font-size="14" font-weight="400" fill="#3A3A3A">That math gets approval, not results.</text>

  <!-- Tile 02 -->
  <rect x="520" y="240" width="440" height="309" rx="16" fill="#FFFFFF" stroke="#11111118" stroke-width="1"/>
  <text x="548" y="300" font-size="44" font-weight="800" fill="#C24A1F">02</text>
  <text x="548" y="342" font-size="22" font-weight="700" fill="#111111">Hidden Operational Costs</text>
  <text x="548" y="374" font-size="16" font-weight="400" fill="#3A3A3A">Retraining, incidents, and expert validation</text>
  <rect x="548" y="400" width="360" height="1" fill="#11111114"/>
  <text x="548" y="432" font-size="14" font-weight="400" fill="#3A3A3A">emerge only after production ships.</text>

  <!-- Tile 03 -->
  <rect x="64" y="565" width="440" height="309" rx="16" fill="#FFFFFF" stroke="#11111118" stroke-width="1"/>
  <text x="92" y="625" font-size="44" font-weight="800" fill="#C24A1F">03</text>
  <text x="92" y="667" font-size="22" font-weight="700" fill="#111111">The Review Loop Trap</text>
  <text x="92" y="699" font-size="16" font-weight="400" fill="#3A3A3A">95% accuracy still needs humans on every output.</text>
  <rect x="92" y="725" width="360" height="1" fill="#11111114"/>
  <text x="92" y="757" font-size="14" font-weight="400" fill="#3A3A3A">That's labor redistributed, not eliminated.</text>

  <!-- Tile 04 -->
  <rect x="520" y="565" width="440" height="309" rx="16" fill="#EFEAE0" stroke="#11111118" stroke-width="1"/>
  <text x="548" y="625" font-size="44" font-weight="800" fill="#C24A1F">04</text>
  <text x="548" y="667" font-size="22" font-weight="700" fill="#111111">Map the Actual Workflow</text>
  <text x="548" y="699" font-size="16" font-weight="400" fill="#3A3A3A">Ask: which steps does AI remove vs. move?</text>
  <rect x="548" y="725" width="360" height="1" fill="#11111114"/>
  <text x="548" y="757" font-size="14" font-weight="400" fill="#3A3A3A">Design around what humans can safely ignore.</text>

  <!-- BOTTOM BAND (~875–1024px) -->
  <!-- Hairline rule -->
  <rect x="64" y="882" width="896" height="1" fill="#11111130"/>

  <!-- Closing line -->
  <text x="512" y="948" font-size="21" font-weight="600" fill="#3A3A3A" text-anchor="middle" letter-spacing="-0.01em">The model pays for itself only when friction disappears.</text>

</svg>