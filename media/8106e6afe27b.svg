<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">

  <!-- Background -->
  <rect width="1024" height="1024" fill="#F5F1EA"/>

  <!-- TOP BAND -->
  <!-- Kicker -->
  <text x="64" y="88" font-size="13" font-weight="600" fill="#2D5BFF" letter-spacing="0.18em" text-anchor="start" font-variant="small-caps">AI</text>

  <!-- Headline -->
  <text x="64" y="142" font-size="54" font-weight="800" fill="#111111" letter-spacing="-0.02em" text-anchor="start">Demo works. Production</text>
  <text x="64" y="202" font-size="54" font-weight="800" fill="#111111" letter-spacing="-0.02em" text-anchor="start">kills it. Here's why.</text>

  <!-- Accent underline under headline -->
  <rect x="64" y="216" width="180" height="3" rx="1.5" fill="#2D5BFF"/>

  <!-- MIDDLE BAND: 3+2 layout (5 tiles) -->
  <!-- Row 1: 3 tiles -->
  <!-- Tile 1 -->
  <rect x="64" y="252" width="286" height="360" rx="16" fill="#EFEAE0" stroke="#11111118" stroke-width="1"/>
  <text x="88" y="312" font-size="48" font-weight="800" fill="#2D5BFF">01</text>
  <text x="88" y="352" font-size="20" font-weight="700" fill="#111111">Single Metric</text>
  <text x="88" y="376" font-size="20" font-weight="700" fill="#111111">Trap</text>
  <text x="88" y="414" font-size="15" font-weight="400" fill="#3A3A3A">Optimizing accuracy ignores</text>
  <text x="88" y="434" font-size="15" font-weight="400" fill="#3A3A3A">the whole system.</text>

  <!-- Tile 2 -->
  <rect x="370" y="252" width="284" height="360" rx="16" fill="#EFEAE0" stroke="#11111118" stroke-width="1"/>
  <text x="394" y="312" font-size="48" font-weight="800" fill="#2D5BFF">02</text>
  <text x="394" y="352" font-size="20" font-weight="700" fill="#111111">Model vs.</text>
  <text x="394" y="376" font-size="20" font-weight="700" fill="#111111">Reality Gap</text>
  <text x="394" y="414" font-size="15" font-weight="400" fill="#3A3A3A">Papers pick models;</text>
  <text x="394" y="434" font-size="15" font-weight="400" fill="#3A3A3A">deployments expose limits.</text>

  <!-- Tile 3 -->
  <rect x="674" y="252" width="286" height="360" rx="16" fill="#EFEAE0" stroke="#11111118" stroke-width="1"/>
  <text x="698" y="312" font-size="48" font-weight="800" fill="#2D5BFF">03</text>
  <text x="698" y="352" font-size="20" font-weight="700" fill="#111111">Siloed</text>
  <text x="698" y="376" font-size="20" font-weight="700" fill="#111111">Teams</text>
  <text x="698" y="414" font-size="15" font-weight="400" fill="#3A3A3A">Prototype team never talks</text>
  <text x="698" y="434" font-size="15" font-weight="400" fill="#3A3A3A">to infrastructure team.</text>

  <!-- Row 2: 2 wide tiles -->
  <!-- Tile 4 -->
  <rect x="64" y="632" width="428" height="230" rx="16" fill="#FFFFFF" stroke="#11111118" stroke-width="1"/>
  <text x="88" y="692" font-size="48" font-weight="800" fill="#2D5BFF">04</text>
  <text x="88" y="734" font-size="20" font-weight="700" fill="#111111">Data Reliability</text>
  <text x="88" y="762" font-size="15" font-weight="400" fill="#3A3A3A">Validate data consistency,</text>
  <text x="88" y="782" font-size="15" font-weight="400" fill="#3A3A3A">not just accuracy.</text>

  <!-- Tile 5 -->
  <rect x="512" y="632" width="448" height="230" rx="16" fill="#FFFFFF" stroke="#11111118" stroke-width="1"/>
  <text x="536" y="692" font-size="48" font-weight="800" fill="#2D5BFF">05</text>
  <text x="536" y="734" font-size="20" font-weight="700" fill="#111111">Operational Fit</text>
  <text x="536" y="762" font-size="15" font-weight="400" fill="#3A3A3A">Can your systems actually</text>
  <text x="536" y="782" font-size="15" font-weight="400" fill="#3A3A3A">run this in production?</text>

  <!-- BOTTOM BAND -->
  <!-- Hairline rule -->
  <line x1="64" y1="892" x2="960" y2="892" stroke="#11111130" stroke-width="1"/>

  <!-- Closing line -->
  <text x="512" y="952" font-size="22" font-weight="400" fill="#3A3A3A" text-anchor="middle" letter-spacing="-0.01em">Ship the weakest model that passes all three gates.</text>

</svg>