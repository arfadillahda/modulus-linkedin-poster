<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">

  <!-- Background -->
  <rect width="1024" height="1024" fill="#F5F1EA"/>

  <!-- Top Band: ~0 to 225 -->
  <g>
    <!-- Kicker -->
    <text x="512" y="88" text-anchor="middle" font-size="13" font-weight="600" letter-spacing="0.18em" fill="#1F5C3D" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" text-decoration="none">SUSTAINABILITY</text>

    <!-- Display Headline -->
    <text text-anchor="middle" font-size="52" font-weight="800" fill="#111111" letter-spacing="-0.02em" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">
      <tspan x="512" dy="120">Your Baseline Moves.</tspan>
      <tspan x="512" dy="62">Your Progress Doesn't.</tspan>
    </text>

    <!-- Accent underline under headline -->
    <line x1="362" y1="232" x2="662" y2="232" stroke="#1F5C3D" stroke-width="2"/>
  </g>

  <!-- Middle Band: ~248 to 860 — 2x2 grid of 4 tiles -->
  <!-- Tile layout: 2 columns, 2 rows -->
  <!-- Col1 x=64, Col2 x=556 -->
  <!-- Row1 y=252, Row2 y=566 -->
  <!-- Tile width = 464, Tile height = 290 -->

  <!-- Tile 01: Rolling Window Problem -->
  <g>
    <rect x="64" y="252" width="432" height="290" rx="16" fill="#EFEAE0" stroke="#11111118" stroke-width="1"/>
    <text x="96" y="316" font-size="48" font-weight="800" fill="#1F5C3D" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">01</text>
    <text x="96" y="362" font-size="22" font-weight="700" fill="#111111" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">Rolling Window</text>
    <text x="96" y="398" font-size="16" font-weight="400" fill="#3A3A3A" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">A moving average shifts your</text>
    <text x="96" y="420" font-size="16" font-weight="400" fill="#3A3A3A" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">denominator every single period.</text>
    <line x1="96" y1="456" x2="462" y2="456" stroke="#1F5C3D" stroke-width="1" stroke-opacity="0.3"/>
    <text x="96" y="484" font-size="14" font-weight="400" fill="#3A3A3A" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-style="italic">Season, volume, efficiency all distort the number.</text>
  </g>

  <!-- Tile 02: Moving Target -->
  <g>
    <rect x="528" y="252" width="432" height="290" rx="16" fill="#EFEAE0" stroke="#11111118" stroke-width="1"/>
    <text x="560" y="316" font-size="48" font-weight="800" fill="#1F5C3D" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">02</text>
    <text x="560" y="362" font-size="22" font-weight="700" fill="#111111" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">Moving Target</text>
    <text x="560" y="398" font-size="16" font-weight="400" fill="#3A3A3A" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">Two auditors sign off two different</text>
    <text x="560" y="420" font-size="16" font-weight="400" fill="#3A3A3A" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">numbers — both technically correct.</text>
    <line x1="560" y1="456" x2="926" y2="456" stroke="#1F5C3D" stroke-width="1" stroke-opacity="0.3"/>
    <text x="560" y="484" font-size="14" font-weight="400" fill="#3A3A3A" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-style="italic">You're chasing a target that moves.</text>
  </g>

  <!-- Tile 03: Lock the Year -->
  <g>
    <rect x="64" y="566" width="432" height="290" rx="16" fill="#FFFFFF" stroke="#11111118" stroke-width="1"/>
    <text x="96" y="630" font-size="48" font-weight="800" fill="#1F5C3D" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">03</text>
    <text x="96" y="676" font-size="22" font-weight="700" fill="#111111" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">Lock the Year</text>
    <text x="96" y="712" font-size="16" font-weight="400" fill="#3A3A3A" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">Anchor to the calendar year before</text>
    <text x="96" y="734" font-size="16" font-weight="400" fill="#3A3A3A" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">your program launches. Hold it fixed.</text>
    <line x1="96" y1="770" x2="462" y2="770" stroke="#1F5C3D" stroke-width="1" stroke-opacity="0.3"/>
    <text x="96" y="798" font-size="14" font-weight="400" fill="#3A3A3A" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-style="italic">Month 6 and month 36 read the same number.</text>
  </g>

  <!-- Tile 04: Hard to Win, Worth It -->
  <g>
    <rect x="528" y="566" width="432" height="290" rx="16" fill="#FFFFFF" stroke="#11111118" stroke-width="1"/>
    <text x="560" y="630" font-size="48" font-weight="800" fill="#1F5C3D" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">04</text>
    <text x="560" y="676" font-size="22" font-weight="700" fill="#111111" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">Hard to Win Early</text>
    <text x="560" y="712" font-size="16" font-weight="400" fill="#3A3A3A" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">A fixed baseline makes early progress</text>
    <text x="560" y="734" font-size="16" font-weight="400" fill="#3A3A3A" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">look smaller — and that's the point.</text>
    <line x1="560" y1="770" x2="926" y2="770" stroke="#1F5C3D" stroke-width="1" stroke-opacity="0.3"/>
    <text x="560" y="798" font-size="14" font-weight="400" fill="#3A3A3A" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-style="italic">Harder to game is exactly why it's trustworthy.</text>
  </g>

  <!-- Bottom Band -->
  <line x1="64" y1="888" x2="960" y2="888" stroke="#111111" stroke-width="1" stroke-opacity="0.12"/>
  <text x="512" y="940" text-anchor="middle" font-size="20" font-weight="600" fill="#3A3A3A" letter-spacing="-0.01em" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">A fixed baseline is the only number worth tracking.</text>

</svg>