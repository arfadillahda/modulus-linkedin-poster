name: generate-personal

on:
  schedule:
    # Daily 06:00 UTC (~13:00 WIB) — gives Make.com a fresh item every day
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Generate next post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_personal.py

      - name: Rebuild RSS feed
        run: python scripts/build_rss.py

      - name: Commit queue + feed
        run: |
          if [ -n "$(git status --porcelain data/ feed/)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/ feed/
            git commit -m "chore: new personal post + rss rebuild"
            git push
          fi
